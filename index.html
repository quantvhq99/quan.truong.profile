<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glass Morphism Style</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .glass {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 20px;
            backdrop-filter: blur(5px);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.18);
            position: relative;
            overflow: hidden;
            width: 90%;
            max-width: 600px;
        }
        .blob {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            animation: float 5s infinite;
        }
        @keyframes float {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-20px);
            }
        }
        .responsive {
            font-size: 1.2em;
        }
        @media (max-width: 480px) {
            .responsive {
                font-size: 1em;
            }
        }
        @media (max-width: 768px) {
            .responsive {
                font-size: 1.1em;
            }
        }
    </style>
</head>
<body>
    <div class="glass">
        <h1 class="responsive">Welcome to Glass Morphism Style</h1>
        <p class="responsive">This design showcases glass morphism effects with animated blobs.</p>
        <div class="blob" style="width: 100px; height: 100px; top: -20%; left: 10%; animation-duration: 6s;"></div>
        <div class="blob" style="width: 80px; height: 80px; bottom: -30%; right: 15%; animation-duration: 4s;"></div>
    </div>
</body>
</html>
